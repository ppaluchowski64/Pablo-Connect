on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Ninja (MacOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Conan
        uses: conan-io/setup-conan@v1

      - name: Create default Conan profile (if it doesn't exist)
        run: conan profile detect --force

      - name: Install Conan dependencies and generate toolchain
        run: conan install . --output-folder build --build=missing -s compiler.cppstd=20 -s build_type=Release

      - name: Configure CMake
        run: cmake --preset conan-release -B build -S . -G Ninja

      - name: Build
        run: cmake --build build --preset conan-release

      - name: Run tests
        working-directory: ./build/Release
        run: |
          ./Asio_Abstractions_Test -C Release --output-on-failure
          ./Concurrent_Structures_Test -C Release --output-on-failure